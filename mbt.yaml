_schema-version: '3.1'
ID: realtorio-cap
version: 1.0.0
description: "Protótipo CAP - Relatório de Requisições"
parameters:
  enable-parallel-deployments: true

modules:
  - name: realtorio-cap-srv
    type: nodejs
    path: .
    provides:
      - name: srv
        public: true
        url: ${default-url}
    properties:
      memory: 256M

  - name: realtorio-cap-app
    type: html5
    path: app/reqreport/webapp
    requires:
      - name: srv
        group: destinations
        properties:
          forwardAuthToken: true
          name: srv
          url: ~{srv/url}

resources:
  - name: realtorio-cap-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: realtorio-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      config:
        xsappname: realtorio-cap
